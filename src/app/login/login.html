<div class="min-h-screen flex flex-col bg-cover bg-center"
  style="background-image: linear-gradient(to bottom, rgba(10,61,43,0.85), rgba(10,26,20,0.95)), url('https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&w=1600&q=80')">

  <!-- Header -->
  <header class="flex items-center px-6 py-5">
    <a routerLink="/" class="flex items-center gap-3 no-underline">
      <div class="w-10 h-10 rounded-full bg-accent flex items-center justify-center text-primary font-black text-lg">L</div>
      <span class="text-accent font-black text-xl tracking-widest uppercase">Luxe Scent</span>
    </a>
  </header>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-black/40 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-2xl">

      <div class="text-center mb-8">
        <h1 class="text-accent font-black text-4xl mb-2" style="font-family: 'Playfair Display', serif">Chào mừng trở lại</h1>
        <p class="text-slate-400 text-sm">
          {{ isLogin() ? 'Vui lòng đăng nhập để tiếp tục' : 'Tạo tài khoản mới' }}
        </p>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-white/10 mb-8">
        <button (click)="toggle(true)"
          class="flex-1 pb-3 text-sm font-bold uppercase tracking-widest transition-colors"
          [class]="isLogin() ? 'text-accent border-b-2 border-accent' : 'text-slate-500'">
          Đăng nhập
        </button>
        <button (click)="toggle(false)"
          class="flex-1 pb-3 text-sm font-bold uppercase tracking-widest transition-colors"
          [class]="!isLogin() ? 'text-accent border-b-2 border-accent' : 'text-slate-500'">
          Đăng ký
        </button>
      </div>

      <!-- Error -->
      @if (error()) {
        <div class="mb-6 p-3 bg-red-500/20 border border-red-500/40 rounded-lg text-red-300 text-sm">{{ error() }}</div>
      }

      <!-- Form -->
      <form (ngSubmit)="submit()" #f="ngForm" class="flex flex-col gap-5">
        @if (!isLogin()) {
          <div>
            <label class="block text-xs font-bold text-accent uppercase tracking-widest mb-2">Họ và tên</label>
            <input [(ngModel)]="formData.name" name="name" type="text" placeholder="Nguyễn Văn A" required
              class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-accent"/>
          </div>
          <div>
            <label class="block text-xs font-bold text-accent uppercase tracking-widest mb-2">Số điện thoại</label>
            <input [(ngModel)]="formData.phone" name="phone" type="tel" placeholder="0912345678" required
              class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-accent"/>
          </div>
        }
        <div>
          <label class="block text-xs font-bold text-accent uppercase tracking-widest mb-2">Email</label>
          <input [(ngModel)]="formData.email" name="email" type="email" placeholder="email@example.com" required
            class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-accent"/>
        </div>
        <div>
          <label class="block text-xs font-bold text-accent uppercase tracking-widest mb-2">Mật khẩu</label>
          <input [(ngModel)]="formData.password" name="password" type="password" placeholder="••••••••" required
            class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-accent"/>
        </div>
        <button type="submit" [disabled]="loading()"
          class="w-full bg-accent text-primary font-black py-4 rounded-lg uppercase tracking-widest text-sm hover:opacity-90 transition-opacity disabled:opacity-50">
          {{ loading() ? 'Đang xử lý...' : (isLogin() ? 'Đăng nhập ngay' : 'Đăng ký ngay') }}
        </button>
      </form>

    </div>
  </main>

  <footer class="text-center text-slate-600 text-xs uppercase tracking-widest py-6">
    © 2026 Luxe Scent Fragrance House. All Rights Reserved.
  </footer>
</div>
