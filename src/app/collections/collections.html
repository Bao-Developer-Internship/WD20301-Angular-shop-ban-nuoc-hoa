<!-- Hero -->
<section class="relative h-64 flex items-center justify-center bg-primary overflow-hidden">
  <div class="absolute inset-0 opacity-10"
    style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDL14fiuJt210LBrq0xkxV6wFlMtDKmv7dnkUEvZJG1Zc9EMbfQeRT6JaKxF-rXRv6DRINeuRSyk01nyf5Ey3khvw7hUQnQKNGurt-ZVIEMhJ6jaVVCSrXhDJju-T_Dg788fVzPn7NTPXF1HgosWb9wOrSu0uHqbXY8v4sPdxo0JvIDGk1bmMr1LTBOtNU_Xm-1z8W5LZxfUYUwzgYqT8OcCCmpxKYs24dbZHujY1M8E8s5mLNXEtJZUJ2Iykgh6Cgn_ufxpB-XUfg'); background-size: cover;"></div>
  <div class="relative z-10 text-center">
    <span class="text-accent text-sm font-bold uppercase tracking-widest block mb-3">Khám Phá</span>
    <h1 class="text-white text-5xl font-black">Bộ Sưu Tập</h1>
  </div>
</section>

<main class="max-w-7xl mx-auto px-4 py-16">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
    @for (col of collections; track col.id) {
      <a [routerLink]="['/collections', col.id]" class="group block cursor-pointer">
        <div class="relative aspect-[3/4] rounded-2xl overflow-hidden mb-5 shadow-md">
          <img [src]="col.img" [alt]="col.title"
            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"/>
          <div class="absolute inset-0 bg-gradient-to-t from-primary/80 via-transparent to-transparent
            opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-6">
            <p class="text-white font-black text-xl mb-1">{{ col.title }}</p>
            <p class="text-white/70 text-sm">{{ col.subtitle }}</p>
            <span class="mt-3 inline-flex items-center gap-1 text-accent text-sm font-bold">
              Xem bộ sưu tập →
            </span>
          </div>
        </div>
        <h3 class="text-xl font-black text-primary group-hover:text-accent transition-colors">{{ col.title }}</h3>
        <p class="text-slate-400 text-sm mt-1">{{ col.subtitle }}</p>
      </a>
    }
  </div>
</main>
