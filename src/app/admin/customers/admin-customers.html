<div class="flex min-h-screen bg-slate-50">
  <app-admin-sidebar />
  <main class="flex-1 p-8">
    <h2 class="text-2xl font-black text-slate-800 mb-8">Quản lý khách hàng</h2>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
      <table class="w-full">
        <thead class="bg-slate-50">
          <tr>
            @for (h of ['Khách hàng', 'Email', 'Điện thoại', 'Đơn hàng', 'Tổng chi', 'Ngày tham gia']; track h) {
              <th class="px-6 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-widest">{{ h }}</th>
            }
          </tr>
        </thead>
        <tbody>
          @for (c of customers; track c.email) {
            <tr class="border-t border-slate-50 hover:bg-slate-50 transition-colors">
              <td class="px-6 py-4">
                <div class="flex items-center gap-3">
                  <div class="w-9 h-9 rounded-full bg-accent/20 flex items-center justify-center text-xs font-bold text-primary">
                    {{ c.name.charAt(0) }}
                  </div>
                  <span class="font-semibold text-slate-800 text-sm">{{ c.name }}</span>
                </div>
              </td>
              <td class="px-6 py-4 text-sm text-slate-500">{{ c.email }}</td>
              <td class="px-6 py-4 text-sm text-slate-500">{{ c.phone }}</td>
              <td class="px-6 py-4 text-sm font-bold text-slate-700">{{ c.orders }}</td>
              <td class="px-6 py-4 text-sm font-bold text-primary">{{ c.total }}</td>
              <td class="px-6 py-4 text-xs text-slate-400">{{ c.joined }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </main>
</div>
