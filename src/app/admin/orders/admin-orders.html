<div class="flex min-h-screen bg-slate-50">
  <app-admin-sidebar />
  <main class="flex-1 p-8">
    <h2 class="text-2xl font-black text-slate-800 mb-8">Quản lý đơn hàng</h2>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
      <table class="w-full">
        <thead class="bg-slate-50">
          <tr>
            @for (h of ['Mã đơn', 'Khách hàng', 'Sản phẩm', 'Giá trị', 'Trạng thái', 'Ngày đặt']; track h) {
              <th class="px-6 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-widest">{{ h }}</th>
            }
          </tr>
        </thead>
        <tbody>
          @for (o of orders; track o.id) {
            <tr class="border-t border-slate-50 hover:bg-slate-50 transition-colors">
              <td class="px-6 py-4 text-sm font-bold text-slate-800">{{ o.id }}</td>
              <td class="px-6 py-4 text-sm text-slate-700">{{ o.customer }}</td>
              <td class="px-6 py-4 text-sm text-slate-500">{{ o.product }}</td>
              <td class="px-6 py-4 text-sm font-bold text-slate-800">{{ o.price }}</td>
              <td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-xs font-bold" [class]="o.statusClass">{{ o.status }}</span></td>
              <td class="px-6 py-4 text-xs text-slate-400">{{ o.date }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </main>
</div>
