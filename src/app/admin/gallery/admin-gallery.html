<div class="flex min-h-screen bg-slate-50">
  <app-admin-sidebar />
  <main class="flex-1 p-8">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h2 class="text-2xl font-black text-slate-800">Quản lý ảnh #LUXESCENT</h2>
        <p class="text-slate-400 text-sm mt-1">Ảnh hiển thị trong section #LUXESCENT trên trang chủ</p>
      </div>
      <div class="flex gap-3">
        @if (saved()) {
          <span class="px-4 py-2 bg-green-100 text-green-700 rounded-xl text-sm font-bold">✓ Đã lưu</span>
        }
        <button (click)="reset()" class="px-4 py-2 border border-slate-200 rounded-xl text-sm text-slate-500 hover:bg-slate-100 transition-colors">
          Khôi phục mặc định
        </button>
      </div>
    </div>

    <!-- Add image -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 mb-8">
      <h3 class="font-bold text-slate-700 mb-4">Thêm ảnh mới</h3>
      <div class="flex flex-col sm:flex-row gap-4">
        <!-- Upload file -->
        <label class="flex-1 flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-xl p-6 cursor-pointer hover:border-primary/40 transition-colors">
          <span class="text-3xl mb-2">📁</span>
          <span class="text-sm font-semibold text-slate-600">Upload từ máy tính</span>
          <span class="text-xs text-slate-400 mt-1">JPG, PNG, WEBP</span>
          <input type="file" accept="image/*" multiple class="hidden" (change)="onFileChange($event)"/>
        </label>
        <!-- URL -->
        <div class="flex-1 flex flex-col gap-3">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Hoặc nhập URL ảnh</label>
          <input [ngModel]="newUrl()" (ngModelChange)="newUrl.set($event)"
            type="url" placeholder="https://example.com/image.jpg"
            class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary"/>
          <button (click)="addByUrl()" [disabled]="!newUrl().trim()"
            class="bg-primary text-white px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-widest hover:bg-primary/90 transition-colors disabled:opacity-40">
            Thêm ảnh
          </button>
        </div>
      </div>
    </div>

    <!-- Gallery grid -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-slate-700">Ảnh hiện tại ({{ galleryService.images().length }})</h3>
        <p class="text-xs text-slate-400">Tối đa 6 ảnh hiển thị trên trang chủ</p>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4">
        @for (img of galleryService.images(); track $index) {
          <div class="relative group aspect-square rounded-xl overflow-hidden border border-slate-100">
            <img [src]="img" class="w-full h-full object-cover"/>
            <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
              <button (click)="remove($index)"
                class="w-9 h-9 bg-red-500 text-white rounded-full flex items-center justify-center hover:bg-red-600 transition-colors text-sm font-bold">
                ✕
              </button>
            </div>
            <span class="absolute top-2 left-2 bg-black/50 text-white text-xs px-2 py-0.5 rounded-full">{{ $index + 1 }}</span>
          </div>
        }
      </div>
    </div>
  </main>
</div>
