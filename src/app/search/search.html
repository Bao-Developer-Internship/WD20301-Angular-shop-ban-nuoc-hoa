<div class="relative">
  <form (ngSubmit)="onSubmit()" class="flex items-center bg-primary/5 rounded-full px-3 py-2 border border-primary/10 focus-within:border-primary/30 transition-colors">
    <span class="material-symbols-outlined text-primary/60 text-lg flex-shrink-0">search</span>
    <input
      [ngModel]="query()"
      (ngModelChange)="onInput($event)"
      (blur)="onBlur()"
      (focus)="onInput(query())"
      name="search"
      type="text"
      placeholder="Tìm kiếm..."
      class="bg-transparent border-none focus:ring-0 text-sm w-28 xl:w-40 placeholder:text-primary/40 outline-none ml-1"/>
  </form>

  @if (showDropdown()) {
    <div class="absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden z-50 min-w-64">
      @for (p of suggestions(); track p.id) {
        <button type="button" (click)="selectProduct(p)"
          class="w-full flex items-center gap-3 px-4 py-3 hover:bg-primary/5 transition-colors text-left">
          <img [src]="p.img" [alt]="p.name" class="w-10 h-10 rounded-lg object-cover flex-shrink-0"/>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-primary truncate" [innerHTML]="highlight(p.name)"></p>
            <p class="text-xs text-slate-400">{{ p.brand }} · {{ p.price.toLocaleString('vi-VN') }}₫</p>
          </div>
        </button>
      }
      <div class="border-t border-slate-100 px-4 py-2">
        <button type="button" (click)="onSubmit()" class="text-xs text-accent font-bold hover:underline w-full text-left">
          Xem tất cả kết quả cho "{{ query() }}" →
        </button>
      </div>
    </div>
  }
</div>
