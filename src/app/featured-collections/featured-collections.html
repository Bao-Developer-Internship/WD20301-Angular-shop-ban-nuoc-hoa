<section class="py-24 overflow-hidden">
  <div class="max-w-7xl mx-auto px-4 mb-16 flex justify-between items-end">
    <div>
      <h3 class="text-accent font-bold uppercase tracking-widest text-sm mb-4">Khám Phá</h3>
      <h2 class="text-4xl md:text-5xl font-black text-primary dark:text-white leading-tight">Bộ Sưu Tập Đặc Biệt</h2>
    </div>
    <div class="flex gap-4 mb-2">
      <button (click)="scroll('left')" class="w-12 h-12 rounded-full border border-primary/20 flex items-center justify-center hover:bg-primary hover:text-white transition-colors">
        <span class="material-symbols-outlined">chevron_left</span>
      </button>
      <button (click)="scroll('right')" class="w-12 h-12 rounded-full border border-primary/20 flex items-center justify-center hover:bg-primary hover:text-white transition-colors">
        <span class="material-symbols-outlined">chevron_right</span>
      </button>
    </div>
  </div>
  <div #slider class="flex gap-8 px-4 overflow-x-auto snap-x no-scrollbar pb-10">
    @for (col of (collections$ | async) ?? []; track col.title) {
      <a [routerLink]="['/collections', col.id]" class="snap-center flex-none w-[300px] md:w-[450px] block">
        <div class="relative aspect-[3/4] rounded-xl overflow-hidden mb-6 group">
          <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
            [src]="col.img" [alt]="col.title"/>
          <div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent flex flex-col justify-end p-8 text-white opacity-0 group-hover:opacity-100 transition-opacity">
            <p class="text-sm font-medium mb-2 uppercase tracking-widest">{{ col.title }}</p>
            <h4 class="text-2xl font-bold">{{ col.subtitle }}</h4>
            <span class="mt-2 text-accent text-sm font-bold">Xem bộ sưu tập →</span>
          </div>
        </div>
        <h4 class="text-xl font-bold text-primary dark:text-slate-100 group-hover:text-accent transition-colors">{{ col.title }}</h4>
        <p class="text-primary/60 dark:text-slate-400">{{ col.subtitle }}</p>
      </a>
    }
  </div>
</section>
