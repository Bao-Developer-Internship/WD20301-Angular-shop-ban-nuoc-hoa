<div class="flex gap-3">
  <button (click)="addToCart()" type="button"
    class="flex-1 rounded-xl font-bold uppercase tracking-widest text-sm flex items-center justify-center gap-2 py-4 transition-all duration-300"
    [class]="added() ? 'bg-green-500 text-white' : 'bg-primary text-white hover:bg-primary/90'">
    {{ added() ? '✓ Đã thêm vào giỏ' : '🛒 Thêm vào giỏ' }}
  </button>

  @if (showFavorite) {
    <button (click)="toggleFavorite()" type="button"
      class="w-14 rounded-xl border-2 text-xl transition-all"
      [class]="isFav ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-200 text-slate-400 hover:border-red-300 hover:text-red-400'">
      {{ isFav ? '♥' : '♡' }}
    </button>
  }
</div>

@if (added()) {
  <div class="mt-3 flex items-center justify-between bg-green-50 border border-green-200 rounded-xl px-4 py-3 text-sm">
    <span class="text-green-700 font-semibold">Đã thêm vào giỏ hàng ({{ cartCount }} sản phẩm)</span>
    <a routerLink="/cart" class="text-primary font-bold underline">Xem giỏ hàng →</a>
  </div>
}
